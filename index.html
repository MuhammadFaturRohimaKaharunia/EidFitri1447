<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fatur-Idul Fitri 1447 H</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* BODY DENGAN GRADIENT + BINTANG */
body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:white;
  overflow:hidden;
  opacity:0;
  animation:fadeInBody 1.5s ease forwards;

  background:
    radial-gradient(circle, #ffffff 1px, transparent 1px) 10px 10px,
    radial-gradient(circle, #ffffff 1px, transparent 1px) 30px 30px,
    radial-gradient(circle, #ffffff 1px, transparent 1px) 50px 20px,
    radial-gradient(circle, #ffffff 1px, transparent 1px) 70px 40px,
    radial-gradient(circle, #ffffff 1px, transparent 1px) 90px 15px,
    linear-gradient(180deg, #0c1f66, #08143d);
  background-size:100px 100px;
}

/* BODY FADE */
@keyframes fadeInBody{ to{opacity:1;} }

.wrapper{ width:100%; max-width:560px; }

.frame{
  position:relative;
  width:100%;
  aspect-ratio:3/4.5;
  transform:scale(0.85);
  filter:blur(10px);
  opacity:0;
  animation:frameIntro 1.6s cubic-bezier(.2,.8,.2,1) forwards;
}

@keyframes frameIntro{
0%{transform:scale(0.85);filter:blur(12px);opacity:0;}
60%{transform:scale(1.03);filter:blur(2px);opacity:1;}
100%{transform:scale(1);filter:blur(0);opacity:1;}
}

.frame svg{ width:100%; height:100%; display:block; }

.frame path{ 
  filter:
  drop-shadow(0 0 2px rgba(255,215,0,0.5))
  drop-shadow(0 0 6px rgba(255,215,0,0.3));
}

/* LIGHT SWEEPS */
.frame::before{
content:''; position:absolute; inset:0;
background:linear-gradient(120deg,transparent 0%,transparent 40%,rgba(255,255,255,0.35) 50%,transparent 60%,transparent 100%);
mix-blend-mode:overlay;
animation:sweep1 5s linear infinite; animation-delay:1.5s;
pointer-events:none;
}

.frame::after{
content:''; position:absolute; inset:0;
background:linear-gradient(-60deg,transparent 0%,transparent 45%,rgba(255,255,255,0.25) 50%,transparent 55%,transparent 100%);
mix-blend-mode:overlay;
animation:sweep2 7s linear infinite; animation-delay:2s;
pointer-events:none;
}

@keyframes sweep1{
0%{transform:translateX(-120%) translateY(0);}
50%{transform:translateX(60%) translateY(-10%);}
100%{transform:translateX(120%) translateY(5%);}
}
@keyframes sweep2{
0%{transform:translateX(120%) translateY(0);}
50%{transform:translateX(-40%) translateY(10%);}
100%{transform:translateX(-120%) translateY(-5%);}
}

/* CONTENT */
.content{
position:absolute; top:50%; left:50%;
transform:translate(-50%,-50%);
width:88%; display:flex; flex-direction:column;
align-items:center; text-align:center; gap:6px;
}

.content > *{
opacity:0; transform:translateY(20px); animation:fadeUp 0.8s ease forwards;
}
.content h1{animation-delay:1.2s;}
.content h2{animation-delay:1.4s;}
.content p:nth-of-type(1){animation-delay:1.6s;}
#autoText{animation-delay:1.8s;}
.nama{animation-delay:2s;}
.line{animation-delay:2.2s;}

@keyframes fadeUp{ to{opacity:1; transform:translateY(0);} }

h1{ font-size:clamp(15px,3vw,20px); letter-spacing:2px; }
h2{ font-family:'Great Vibes',cursive; font-size:clamp(35px,8vw,70px); color:#FFD700; white-space:nowrap; }
p{ font-size:clamp(14px,3vw,20px); line-height:1.4; }
.satu-baris{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
.nama{ margin-top:30px; font-size:clamp(12px,2.8vw,14px); }
.line{ margin-top:12px; width:80px; height:2px; background:#FFD700; }
</style>
</head>

<body>
<div class="wrapper">
<div class="frame">

<svg viewBox="0 0 300 480">
<defs>
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#FFD700"/>
    <stop offset="50%" stop-color="#FFF2A6"/>
    <stop offset="100%" stop-color="#C89B00"/>
  </linearGradient>

  <!-- Pattern hexagon gradasi biru -->
  <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0b1d51"/>
    <stop offset="100%" stop-color="#1c3aa9"/>
  </linearGradient>

  <pattern id="hexPattern" patternUnits="userSpaceOnUse" width="30" height="26">
    <polygon points="15,0 30,7.5 30,18.5 15,26 0,18.5 0,7.5" fill="url(#hexGrad)"/>
  </pattern>

  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0b1d51"/>
    <stop offset="100%" stop-color="#1c3aa9"/>
  </linearGradient>
</defs>

<!-- Frame masjid -->
<path d="
M150 5
C210 55, 290 110, 295 170
C300 210, 300 260, 300 300
L300 460
L0 460
L0 300
C0 260, 0 210, 5 170
C10 110, 90 55, 150 5
Z"
fill="url(#bg)"
stroke="url(#gold)"
stroke-width="6"
vector-effect="non-scaling-stroke"
/>

<!-- Overlay hexagon hanya di area biru masjid -->
<mask id="maskFrame">
  <path d="
  M150 5
  C210 55, 290 110, 295 170
  C300 210, 300 260, 300 300
  L300 460
  L0 460
  L0 300
  C0 260, 0 210, 5 170
  C10 110, 90 55, 150 5
  Z"
  fill="white"/>
</mask>

<rect x="0" y="0" width="300" height="480" fill="url(#hexPattern)" mask="url(#maskFrame)"/>

</svg>

<div class="content">
<h1>SELAMAT HARI RAYA</h1>
<h2>Idul Fitri 1447 H</h2>
<p>Mohon maaf lahir dan batin</p>
<p class="satu-baris" id="autoText">Semoga kebahagiaan dan keberkahan selalu menyertai kita.</p>
<p class="nama">Muhammad Fatur Rohima Kaharunia</p>
<div class="line"></div>
</div>

</div>
</div>

<script>
function autoFit(el){
  const parent = el.parentElement;
  const maxWidth = parent.clientWidth - 20;
  let low = 8, high = 40, best = low;
  while(low <= high){
    let mid = Math.floor((low+high)/2);
    el.style.fontSize = mid + "px";
    if(el.scrollWidth <= maxWidth){ best=mid; low=mid+1; }
    else { high=mid-1; }
  }
  el.style.fontSize = best + "px";
}
function run(){ autoFit(document.getElementById("autoText")); }
window.addEventListener("load", run);
window.addEventListener("resize", run);
</script>
</body>
</html>
